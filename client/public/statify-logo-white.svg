<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" fill="none">
  <!-- ── Circle mark ── -->
  <!-- White arc: 240° counterclockwise -->
  <path d="M 145.0 104.0 A 52 52 0 1 0 55.0 104.0"
        stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Gold arc: 120° clockwise -->
  <path d="M 55.0 104.0 A 52 52 0 0 1 145.0 104.0"
        stroke="#FFA916" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- White italic S -->
  <text x="100" y="82"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="600"
        font-size="64"
        fill="#FFFFFF"
        text-anchor="middle"
        dominant-baseline="middle">S</text>

  <!-- ── Wordmark in white ── -->
  <text x="100" y="158"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-weight="900"
        font-size="30"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="3">STATIFY</text>
  <text x="100" y="178"
        font-family="'Arial', sans-serif"
        font-weight="400"
        font-size="10"
        fill="rgba(255,255,255,0.65)"
        text-anchor="middle"
        letter-spacing="3.5">SOLUTIONS LIMITED</text>
</svg>
